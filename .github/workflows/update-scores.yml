name: Update scores

on:
  schedule:
    # Every 5 minutes during match hours of the group stage. Kickoffs run
    # 16:00-23:30 UTC plus late ones at 00:00-04:00 UTC; a 04:00 kickoff
    # finishes ~06:30 UTC, so poll hours 15-23 and 00-06 UTC and skip the
    # dead 07:00-14:59 UTC window. Group stage is June 11-27 local; the
    # last kickoffs land early on June 28 UTC.
    - cron: "*/5 0-6,15-23 11-28 6 *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest scores
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-scores.mjs

      - name: Run scoring tests
        run: node scripts/test-scoring.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet data/matches.json; then
            echo "No score changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          git commit -m "Update match scores"
          git push
